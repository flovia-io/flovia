name: Publish to npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no actual publish)'
        required: false
        default: false
        type: boolean
      package:
        description: 'Which package to publish'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - flovia
          - flovia-cli

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build CLI
        run: npm run build:cli

      - name: Stage packages
        run: bash scripts/stage-packages.sh

      - name: Smoke test (flovia-cli)
        run: node cli/dist-cli/cli/index.js --version

      - name: Smoke test (flovia launcher)
        run: node bin/launch.js --help

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Publishing version: $VERSION"
          npm version "$VERSION" --no-git-tag-version
          cd cli && npm version "$VERSION" --no-git-tag-version && cd ..

      - name: Fail if version is 0.0.0 (no tag)
        run: |
          VER=$(node -p "require('./package.json').version")
          if [ "$VER" = "0.0.0" ]; then
            echo "::error::Version is 0.0.0 — push a tag like v0.1.0 to set the version"
            exit 1
          fi
          echo "Version to publish: $VER"

      - name: Publish @flovia-io/flovia
        if: ${{ github.event_name == 'push' || inputs.package == 'both' || inputs.package == 'flovia' }}
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --access public --dry-run
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @flovia-io/cli
        if: ${{ github.event_name == 'push' || inputs.package == 'both' || inputs.package == 'flovia-cli' }}
        working-directory: cli
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --access public --dry-run
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
